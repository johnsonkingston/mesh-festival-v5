<html>
    <head>
        <script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
        <title>Mesh – Festival of Art and Technology – Template</title>
        <style>
            @font-face {
                font-family: 'FreeSerif-JK';
                src: url('../fonts/JK-MESH-Serif.woff2') format('woff2'),
                    url('../fonts/JK-MESH-Serifwoff') format('woff');
                font-weight: 500;
                font-display: swap;
            }

            @font-face {
                font-family: 'FreeSans-JK';
                src: url('../fonts/JK-MESH-Sans.woff2') format('woff2'),
                    url('../fonts/JK-MESH-Sans.woff') format('woff');
                font-weight: bold;
                font-style: normal;
            }
            body{
                margin: 0;
                font-family: 'FreeSans-JK';
                text-align: center;
                font-size: 28px;
                line-height: 28px;
                text-align: left;
                color: rgb(140, 110, 255);
                min-height: 120vh;
            }
            p{
                margin-left: 10px;
                margin-block-start: 0em;
                margin-block-end: 0em;
                font-size: 14px;
                line-height: 16px;
            }
            h1{
                margin: 10px;
                font-weight: normal;
                font-size: 28px;
                line-height: 28px;
            }
           textarea,button
                {
                border:1px solid rgb(140, 110, 255);
                font-family: 'FreeSans-JK';
                font-size: 28px;
                line-height: 28px;
                text-align: center;
                color: rgb(140, 110, 255);
                background: transparent;
                width: 45vw;
                display: block;
                resize: none;
                margin: 10px;

            }
            button{
                display: block;
                margin: 10px;
                background: #ccc;
                cursor: pointer;
                padding: 10px;
            }
            button:hover{
                background: rgb(140, 110, 255);
                color: #ccc;
            }
            #input2{
                font-family: 'FreeSerif-JK';
                
            }

            canvas{
                position: fixed;
                right: -2000px;
                bottom: -2000px; 

            }
            img{
                transform-origin: top left;
                transform: scale(0.5);
                box-shadow: 0 0 10px rgb(140, 110, 255);
                margin: 10px;
            }
            .backimage{
                width: 960px;
                height: 540px;
                position: absolute;
                background-image: url('../img/template-back.jpg');
                background-size: contain;
                margin: 10px;
            }
        </style>
    </head>
    <body>
        <h1>Mesh Festival Keynote Template</h1>
        <textarea rows="3" id="input1" placeholder="Artist Name"></textarea>
        <textarea rows="3" id="input2" placeholder="Title of the Presentation"></textarea>
<p>Manually add line breaks if needed.</p>
    
        <button onclick="render()">Generate PNG</button>

        <canvas id="canvas" width="1920" height="1080"></canvas>
        <img>
        <div class="backimage"></div>
        <script>
            function render(){
    
            $('#image').remove();

            var line1 = $('#input1').val().trim();
            var line2 = $('#input2').val().trim();
            var separateLines1 = line1.split(/\r?\n|\r|\n/g);
            var separateLines2 = line2.split(/\r?\n|\r|\n/g);
            var fontSize1 = 150;
            var fontSize2 = 175;
            var lineHeight = 160;
            var lineHeightSans = 140;
            var scale = 1;

            var totalLines = separateLines1.length+separateLines2.length;
            var center = 500;
            //console.log(totalLines);
            //console.log(separateLines1.length - separateLines2.length);

            if(totalLines > 9){
                scale = 0.5;
            }else if(totalLines > 7){
                scale = 0.6;
            }else if(totalLines > 5){
                scale = 0.7;
            }

            center = center + (lineHeight*(separateLines1.length - separateLines2.length)*0.5*scale);

            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 1920, 1080);

            var background = new Image();
            background.src = "template1.png";

            background.onload = function(){
                ctx.drawImage(background,0,0);   

                ctx.font = fontSize1*scale+'px FreeSans-JK';
                ctx.fillStyle = '#8C6EFF'
                ctx.textAlign = "center";
                ctx.textBaseline = 'bottom';

                y = center;
                for (let i = separateLines1.length-1; i > -1; i--) {
                    ctx.fillText(separateLines1[i], 960, y);
                    y = y - lineHeightSans*scale;
                }


                ctx.textBaseline = 'top';
                ctx.font = fontSize2*scale+'px FreeSerif-JK';
                y = center;
                for (let i = 0; i < separateLines2.length; i++) {
                    ctx.fillText(separateLines2[i], 960, y);
                    y = y + lineHeight*scale;
                }
                
                var foreground = new Image();
                foreground.src = "template2.png";

                foreground.onload = function(){
                    ctx.drawImage(foreground,0,0);   

                    var dataURL = canvas.toDataURL("image/png");

                    $('body').append('<a id="image" href="'+dataURL+'" download="Mesh-Festival-Cover.png"><img src="'+dataURL+'"></>');

                }


            }











            }

        </script>
    </body>
</html>
