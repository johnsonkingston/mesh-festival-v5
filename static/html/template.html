<html>
    <head>
        <script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
        <style>
            @font-face {
                font-family: 'FreeSerif-JK';
                src: url('../fonts/JK-MESH-Serif.woff2') format('woff2'),
                    url('../fonts/JK-MESH-Serifwoff') format('woff');
                font-weight: 500;
                font-display: swap;
            }

            @font-face {
                font-family: 'FreeSans-JK';
                src: url('../fonts/JK-MESH-Sans.woff2') format('woff2'),
                    url('../fonts/JK-MESH-Sans.woff') format('woff');
                font-weight: bold;
                font-style: normal;
                font-display: swap;
            }
            body{
                margin: 0;
                font-family: 'FreeSans-JK';
                text-align: center;
                font-size: 10vw;
                list-style: 11vw;
                background: transparent;
                text-align: center;
            }
           textarea
                {
                border:1px solid rgb(140, 110, 255);
                font-family: 'FreeSans-JK';
                font-size: 28px;
                line-height: 28px;
                text-align: center;
                color: rgb(140, 110, 255);
                background: transparent;
                width: 45vw;
                display: inline-block;

            }
            #input2{
                font-family: 'FreeSerif-JK';
                
            }

            canvas{
                position: fixed;
                right: -2000px;
                bottom: -2000px; 

            }
            img{
                transform-origin: top left;
                transform: scale(0.5);
                border: 1px solid black
            }
            .backimage{
                width: 960px;
                height: 540px;
                position: absolute;
                background-image: url('../img/template-back.jpg');
                background-size: contain;
            }
        </style>
    </head>
    <body>
        <textarea rows="3" id="input1" placeholder="Artist Name"></textarea>
        <textarea rows="3" id="input2" placeholder="Title of the Presentation"></textarea>

    
        <button onclick="render()">Generate PNG</button>

        <canvas id="canvas" width="1920" height="1080"></canvas>
        <img>
        <div class="backimage"></div>
        <script>
            function render(){
    
            $('#image').remove();

            var line1 = $('#input1').val().trim();
            var line2 = $('#input2').val().trim();
            var separateLines1 = line1.split(/\r?\n|\r|\n/g);
            var separateLines2 = line2.split(/\r?\n|\r|\n/g);
            var lineHeight = 160;

            var totalLines = separateLines1.length+separateLines2.length;
            var center = 540;
            console.log(separateLines1.length - separateLines2.length);

            if(separateLines1.length - separateLines2.length == 3){
                center = center + (lineHeight*1.5);
            }else if(separateLines1.length - separateLines2.length == 2){
                center = center + (lineHeight*1);
            }else if(separateLines1.length - separateLines2.length == 1){
                center = center + (lineHeight*0.5);
            }else if(separateLines1.length - separateLines2.length == 0){
                center = center;
            }else if(separateLines1.length - separateLines2.length == -1){
                center = center - (lineHeight*0.5);
            }else if(separateLines1.length - separateLines2.length == -2){
                center = center - (lineHeight*1);
            }else if(separateLines1.length - separateLines2.length == -3){
                center = center - (lineHeight*1.5);
            }
            
            
            //center += (lineHeight*(separateLines1.length - separateLines2.length));

            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 1920, 1080);

            





            ctx.font = '150px FreeSans-JK';
            ctx.fillStyle = '#8C6EFF'
            ctx.textAlign = "center";
            ctx.textBaseline = 'bottom';

            y = center;
            for (let i = separateLines1.length-1; i > -1; i--) {
                ctx.fillText(separateLines1[i], 960, y);
                y = y - lineHeight;
            }


            ctx.textBaseline = 'top';
            ctx.font = '175px FreeSerif-JK';
            y = center;
            for (let i = 0; i < separateLines2.length; i++) {
                ctx.fillText(separateLines2[i], 960, y);
                y = y + lineHeight;
            }
            

            var dataURL = canvas.toDataURL("image/png");

            $('body').append('<a id="image" href="'+dataURL+'" download="Mesh-Festival-Cover.png"><img src="'+dataURL+'"></>');

            


           // });








            }

        </script>
    </body>
</html>
